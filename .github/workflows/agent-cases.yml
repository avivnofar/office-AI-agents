name: Agent Simulation — Weekly Case Batch

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 09:00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  generate-cases:
    name: Generate weekly case batch
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate case batch
        run: node .github/scripts/generate-agent-cases.mjs

      - name: Commit generated cases
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database/cases-*.json
          git diff --cached --quiet || git commit -m "chore(agents): generate weekly case batch [skip ci]"
          git push
