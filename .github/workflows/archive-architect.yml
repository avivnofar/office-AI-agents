name: Archive Architect - Daily Research

# Israel time (Asia/Jerusalem) is UTC+3 in summer (DST) and UTC+2 in
# winter. GitHub Actions cron is always UTC and does not shift with DST,
# so 15:00 Israel time maps to a different UTC hour across the year.
# Both candidate crons are scheduled every weekday; the runtime check in
# the "Check if this is the correct Israel-time trigger" step below
# verifies the actual local time in Asia/Jerusalem and skips the run
# that doesn't land on 15:00 local. This self-corrects across DST
# changes with no manual maintenance twice a year.
on:
  schedule:
    - cron: '0 12 * * 0-4'
    - cron: '0 13 * * 0-4'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout office-AI-agents (this repo)
        uses: actions/checkout@v4

      # Read-only research input (a "pull", allowed under the General
      # agent-conduct rules — config/project-permissions.json's
      # archive-galil-elion entry is push:false, not pull:false). This
      # workflow fires at most once/day, so it's within the repo-wide
      # 1-pull/day cap by construction. ARCHIVE_REPO_TOKEN stays scoped
      # only to local-archive-galil-elion, read access only.
      - name: Checkout local-archive-galil-elion (read-only research input)
        uses: actions/checkout@v4
        with:
          repository: avivnofar/local-archive-galil-elion
          path: archive
          token: ${{ secrets.ARCHIVE_REPO_TOKEN }}

      # 2026-07-08 fix: GitHub Actions' scheduling delay for low-traffic
      # repos has historically run this job 1.5-4h after either candidate
      # cron fires (empirically confirmed via `gh run view --json jobs` on
      # 2026-07-06/07 runs — see TOKEN-BUDGET.md), which the old exact-hour
      # match ("$CURRENT_HOUR" != "15") always missed, silently skipping the
      # research+email every day since 2026-07-06 despite a green run.
      # Replaced with a +/-90min tolerance window around 15:00 Israel time.
      # Both candidate cron slots (12:00 and 13:00 UTC = 15:00 and 16:00
      # IDT) now land inside that window on the same day, so a same-day
      # dedup guard (today's suggestion file already existing in this
      # checkout) prevents a double-fire/double-email if both slots'
      # delayed runs land within tolerance on the same day.
      - name: Check if this is the correct Israel-time trigger and not weekend
        id: time_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual runs always execute - the Israel-time gate below only
            # exists to pick the correct one of the two scheduled crons.
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TOLERANCE_MINUTES=90
          TARGET_MINUTES=$((15 * 60))  # 15:00 Israel time

          # 10#... forces base-10 (date's zero-padded "08"/"09" would
          # otherwise be misread as invalid octal literals in arithmetic).
          CURRENT_HOUR=$(TZ=Asia/Jerusalem date +%H)
          CURRENT_MIN=$(TZ=Asia/Jerusalem date +%M)
          DAY=$(TZ=Asia/Jerusalem date +%u)
          TODAY=$(TZ=Asia/Jerusalem date +%Y-%m-%d)
          NOW_MINUTES=$((10#$CURRENT_HOUR * 60 + 10#$CURRENT_MIN))
          DIFF=$(( NOW_MINUTES > TARGET_MINUTES ? NOW_MINUTES - TARGET_MINUTES : TARGET_MINUTES - NOW_MINUTES ))

          if [ "$DIFF" -gt "$TOLERANCE_MINUTES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skip: now ${CURRENT_HOUR}:${CURRENT_MIN} Israel time, ${DIFF}min from the 15:00 target (tolerance +/-${TOLERANCE_MINUTES}min)."
          elif [ "$DAY" -eq 5 ] || [ "$DAY" -eq 6 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skip: weekend (Fri/Sat)."
          elif [ -f "reports/architect-suggestions/${TODAY}.md" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skip: reports/architect-suggestions/${TODAY}.md already exists - already ran today (dedup guard against both cron slots landing inside the tolerance window on the same day)."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Architect research
        if: steps.time_check.outputs.skip == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          pip install requests
          python3 agents/architect_agent.py

      # No push to local-archive-galil-elion anymore (see project
      # decision, 2026-07-08): the suggestion file was written by
      # architect_agent.py directly into reports/architect-suggestions/
      # in THIS checkout (office-AI-agents), so a normal same-repo commit
      # is all that's needed — no ARCHIVE_REPO_TOKEN involved, no
      # cross-repo push. Uses the job's default contents:write GITHUB_TOKEN.
      - name: Commit suggestion file to office-AI-agents
        if: steps.time_check.outputs.skip == 'false'
        run: |
          git config user.name "Architect Agent"
          git config user.email "architect@noreply.github.com"
          git add reports/architect-suggestions/
          git commit -m "chore(architect): suggestion for $(date +%Y-%m-%d) [skip ci]" || echo "Nothing to commit"
          git push
