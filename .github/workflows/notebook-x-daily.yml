name: Notebook-X Daily Automation

# LIVE as of 2026-07-10. Fires daily at 01:00 Israel time, inside
# config/chore-schedule.json's 00:00-06:00 IL "Night sweep" window and
# clear of the 06:00-08:00 IL case-simulation buffer and the
# 08:00-16:30 IL office-simulation cron. Israel is UTC+3 (IDT) as of this
# date (see ISRAEL_UTC_OFFSET_HOURS in workers/agent-runner.js) — 01:00 IDT
# = 22:00 UTC the previous day, hence the cron below. IMPORTANT: when
# Israel switches to IST (UTC+2, late Oct) or back to IDT (late Mar),
# update this cron the same way agent-runner.js's DST caveat describes.
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notebook-x-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Notebook-X daily automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTEBOOK_X_REPO_TOKEN: ${{ secrets.NOTEBOOK_X_REPO_TOKEN }}
        run: node .github/scripts/notebook-x-daily.mjs

      - name: Commit staged content + progress + daily log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/notebook-x/ config/notebook-x-progress.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "notebook-x-daily: automated run $(date -u +%Y-%m-%d)"
            git pull --rebase origin master
            git push origin master
          fi
