name: Scheduled Claude Automation

on:
  schedule:
    # NIGHT OFFICE: 23:30 UTC = 02:30 Israel time — office simulation session
    - cron: '30 23 * * 0-4'
  workflow_dispatch:
    inputs:
      session_type:
        description: 'Which session to run manually'
        required: true
        type: choice
        default: 'night-office'
        options:
          - night-office
      task_override:
        description: 'Override task (leave empty to use default)'
        required: false
      explicit_code_task:
        description: 'Allow this run to write code files (.js/.py/.ts/etc.) — only set true when task_override explicitly asks for a code change'
        required: false
        type: boolean
        default: false

jobs:
  night-office:
    if: github.event.schedule == '30 23 * * 0-4' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      SESSION_TYPE: office_day_night
      TASK: "${{ github.event.inputs.task_override || 'Run one full simulated work day: all 11 agents process their cases using Groq as primary model, Claude capped at 5 calls. Generate and commit a daily report from D1 results.' }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run Claude task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          EXPLICIT_CODE_TASK: "${{ github.event.inputs.explicit_code_task || 'false' }}"
        run: node .github/scripts/run-claude-session.js
      - name: Commit changes and log session
        run: bash .github/scripts/commit-and-log.sh
