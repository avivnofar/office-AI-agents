name: TEMP - Gemini model list + replacement test (one-off, delete after use)

# Diagnostic-only workflow, not meant to linger. Lists all models the real
# GEMINI_API_KEY can see, then isolates one live test against whichever
# looks like the cheapest/fastest ("flash-lite" tier, falling back to
# "flash") replacement for the now-retired gemini-2.5-flash-lite. Deleted
# immediately after this run — see TOKEN-BUDGET.md for the result.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  list-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: List available models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -s "https://generativelanguage.googleapis.com/v1beta/models?pageSize=200" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -o models.json
          echo "=== full model list (name / displayName / supportedGenerationMethods) ==="
          jq -r '.models[] | [.name, .displayName, (.supportedGenerationMethods | join(","))] | @tsv' models.json
          echo "=== raw response (in case jq parsing above missed anything) ==="
          cat models.json

      - name: Isolated live test against gemini-3.1-flash-lite
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== testing: gemini-3.1-flash-lite ==="
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d '{"contents":[{"role":"user","parts":[{"text":"Reply with exactly one word: OK"}]}],"generationConfig":{"maxOutputTokens":10}}')
          echo "$RESPONSE"
