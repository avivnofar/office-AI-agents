name: Notebook Health Check
on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC daily
  workflow_dispatch:        # manual trigger

permissions:
  contents: read
  issues: write   # 2026-07-08 fix: default token permissions on this repo
                  # are read-only (Contents/Metadata/Packages: read, no
                  # Issues), so github.rest.issues.create() below has been
                  # failing "Resource not accessible by integration" (403)
                  # on every failing run since at least 2026-06-28 — the
                  # health check WAS correctly detecting the real problem
                  # (notebookCount: 0, githubConnected: false), it just
                  # couldn't file the alert. Matches the same class of fix
                  # already applied to office-AI-agents' agent-reports.yml
                  # (explicit job-level `permissions:` block).

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check notebook health
        id: health
        run: |
          RESPONSE=$(curl -s https://notebook-x-api.onrender.com/api/health)
          echo "Response: $RESPONSE"
          COUNT=$(echo "$RESPONSE" | jq -r '.notebookCount // 0')
          CONNECTED=$(echo "$RESPONSE" | jq -r '.githubConnected // false')
          echo "Notebook count: $COUNT"
          echo "GitHub connected: $CONNECTED"
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -lt 3 ]; then
            echo "ALERT: notebook count is $COUNT (expected >= 3)"
            exit 1
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const count = '${{ steps.health.outputs.count }}';
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'ALERT: Notebook count dropped — possible data loss',
              body: `The health check detected ${count} notebooks (expected >= 3).\n\nCheck \`notebooks/\` in the repo immediately.\n\nHealth endpoint: https://notebook-x-api.onrender.com/api/health`,
              labels: ['critical']
            })
